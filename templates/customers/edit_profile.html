{% extends 'customers/dashboard.html' %} 
{% load static %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto; padding-top: 20px;">
    
    <div style="margin-bottom: 30px;">
        <h2 style="color: white; font-weight: 500;">Edit Profile</h2>
        <p style="color: var(--text-muted); font-size: 14px;">Update your personal details and delivery info.</p>
    </div>

    <div style="background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px;">
        
        <form method="POST" action="{% url 'edit_profile' %}">
            {% csrf_token %}
            
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">First Name</label>
                    <input type="text" name="first_name" value="{{ user.customer.first_name }}" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">Last Name</label>
                    <input type="text" name="last_name" value="{{ user.customer.last_name }}" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none; box-sizing: border-box;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">Email Address</label>
                <input type="email" name="email" value="{{ customer.user.email }}" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">Phone Number</label>
                <input type="text" name="phone" value="{{ customer.phone }}" required placeholder="e.g. 0912 345 6789" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 30px;">
                <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">Default Delivery Address</label>
                <input type="text" name="address" value="{{ customer.address }}" required placeholder="123 Coffee Street..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none; box-sizing: border-box;">
            </div>

            <div style="display: flex; gap: 15px;">
                <a href="{% url 'customer_profile' %}" style="flex: 1; text-align: center; padding: 15px; border: 1px solid var(--border-color); color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Cancel</a>
                <button type="submit" class="btn" style="flex: 2; padding: 15px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; text-align: center; border-radius: 8px;">Save Changes</button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
