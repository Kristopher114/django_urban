{% extends 'customers/dashboard.html' %} 
{% load static %}

{% block content %}
<style>
    /* 1. Hide the ugly default radio circles completely */
    .payment-radio {
        display: none; 
    }

    /* 2. Base styling for the clickable cards */
    .payment-card {
        display: flex; 
        align-items: center; 
        padding: 15px; 
        border: 2px solid var(--border-color);
        border-radius: 8px; 
        margin-bottom: 15px; 
        cursor: pointer; 
        transition: 0.3s;
    }

    /* 3. The Magic Trick: Highlight the card when its hidden radio is checked! */
    .payment-card:has(.payment-radio:checked) {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.05);
    }
</style>

<div class="container">
    <h2 style="margin-bottom: 30px;">Secure Checkout</h2>

    <form method="POST" action="{% url 'orders:checkout' %}">
        {% csrf_token %}
        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            
            <div style="flex: 2; min-width: 300px;">
                <div style="background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; margin-bottom: 20px;">
                    <h3 style="color: white; margin-bottom: 20px; font-weight: 500;">1. Delivery Details</h3>
                    
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">Delivery Address</label>
                        <input type="text" name="delivery_address" required placeholder="123 Coffee Street, Apt 4B" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none;">
                    </div>

                    <div>
                        <label style="display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">Phone Number</label>
                        <input type="text" name="phone_number" required placeholder="0912 345 6789" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-surface); color: white; outline: none;">
                    </div>
                </div>

                <div style="background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px;">
                    <h3 style="color: white; margin-bottom: 20px; font-weight: 500;">2. Payment Method</h3>
                    
                    <label class="payment-card">
                        <input type="radio" name="payment_method" value="COD" required class="payment-radio">
                        <div>
                            <span style="color: white; font-weight: 500; display: block;">Cash on Delivery (COD)</span>
                            <span style="color: var(--text-muted); font-size: 13px;">Pay our rider when your food arrives.</span>
                        </div>
                    </label>

                    <label class="payment-card" style="margin-bottom: 0;">
                        <input type="radio" name="payment_method" value="PayPal" required class="payment-radio">
                        <div>
                            <span style="color: white; font-weight: 500; display: block;">PayPal / Credit Card</span>
                            <span style="color: var(--text-muted); font-size: 13px;">Pay securely online right now.</span>
                        </div>
                    </label>
                </div>
            </div>

            <div style="flex: 1; min-width: 250px;">
                <div style="background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; position: sticky; top: 20px;">
                    <h3 style="color: white; margin-bottom: 20px; font-weight: 500;">Order Summary</h3>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-muted);">
                        <span>Subtotal</span>
                        <span>₱{{ subtotal|floatformat:2 }}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--text-muted);">
                        <span>Tax (12%)</span>
                        <span>₱{{ tax|floatformat:2 }}</span>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--border-color); color: white; font-weight: 600; font-size: 18px;">
                        <span>Total Due</span>
                        <span>₱{{ total|floatformat:2 }}</span>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; padding: 15px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 30px;">Place Order</button>
                </div>
            </div>

        </div>
    </form>
</div>
{% endblock %}
